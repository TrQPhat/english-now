<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ôn tập TOEIC xáo trộn</title>
    <link rel="stylesheet" href="practice.css" />
  </head>
  <body>
    <header>
      <a href="index.html" class="back-link">← Làm đề gốc</a>
      <div>
        <p class="eyebrow">ENGLISH NOW</p>
        <h1>Quiz ôn tập xáo trộn</h1>
      </div>
      <button id="finish" type="button" hidden>Nộp bài</button>
    </header>

    <main>
      <section id="setup" class="setup card">
        <p class="kicker">CHỌN NỘI DUNG ÔN TẬP</p>
        <h2>Xáo câu hỏi từ cả 3 bộ đề</h2>
        <p class="intro">Câu đơn được xáo độc lập. Part 3, 4, 6 và 7 được giữ nguyên theo nhóm hội thoại hoặc passage.</p>
        <div id="part-options" class="part-options"></div>
        <div class="setup-actions">
          <button id="start" type="button">Bắt đầu quiz</button>
          <button id="resume" class="secondary" type="button" hidden>Tiếp tục phiên trước</button>
        </div>
        <p id="setup-error" class="error" hidden>Hãy chọn ít nhất một Part.</p>
      </section>

      <section id="runner" class="runner" hidden>
        <div class="progress-card card">
          <div><span id="progress-label">Nhóm 1/1</span><strong id="answered-label">0 câu đã làm</strong></div>
          <div class="progress-track"><span id="progress-bar"></span></div>
        </div>
        <article id="group-card" class="group-card card"></article>
        <nav class="runner-actions">
          <button id="previous" class="secondary" type="button">Nhóm trước</button>
          <button id="next" type="button">Nhóm tiếp</button>
        </nav>
      </section>

      <section id="results" class="results card" hidden></section>
    </main>
    <script type="module" src="practice.js"></script>
  </body>
</html>
